<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<script src="ToDoList.js"></script>
<style>

body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
    cursor:pointer;
}

li{
    margin-top:10px;
    list-style:none;
    background:#eee;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration:line-through;
    color:green;
}

</style>

</head>
<body>

<div class="container">

<h2>To-Do List</h2>

<input type="text" id="task" placeholder="Enter Task">

<button onclick="addTask()">Add</button>

<h3>Completed Tasks :
<span id="count">0</span>
</h3>

<ul id="list">

</ul>

</div>

<script src="script.js"></script>

</body>
</html>
